spring.application.name=lekkeratlas-backend

server.port=8080

# The backend is a normal HTTP application.
spring.main.web-application-type=servlet

# Authentik host can differ per environment, e.g.:
# local:  AUTHENTIK_HOST=http://localhost:9000
# prod:   AUTHENTIK_HOST=https://auth.example.com
app.authentik.host=${AUTHENTIK_HOST}

# Replace `your-provider-slug` with the slug of your Authentik OAuth2/OpenID provider/application.
app.authentik.issuer-uri=${app.authentik.host}/application/o/lekker-atlas/

spring.security.oauth2.client.registration.authentik.client-id=${AUTHENTIK_CLIENT_ID}
spring.security.oauth2.client.registration.authentik.client-secret=${AUTHENTIK_CLIENT_SECRET}

spring.security.oauth2.client.registration.authentik.scope=openid,profile,email
spring.security.oauth2.client.registration.authentik.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.authentik.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.authentik.client-authentication-method=client_secret_post

spring.security.oauth2.client.provider.authentik.issuer-uri=${app.authentik.issuer-uri}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${app.authentik.issuer-uri}

server.forward-headers-strategy=framework

# OpenAPI config
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/

# OIDC / Authentik integration for Swagger UI
springdoc.swagger-ui.oauth.client-id=${AUTHENTIK_CLIENT_ID}
springdoc.swagger-ui.oauth.use-pkce-with-authorization-code-grant=true
springdoc.swagger-ui.oauth.scopes=openid profile email

# Optional UX improvements
springdoc.swagger-ui.oauth.app-name=LekkerAtlas API
springdoc.swagger-ui.persist-authorization=true