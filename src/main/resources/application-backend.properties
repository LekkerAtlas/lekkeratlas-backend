spring.application.name=lekkeratlas-backend
server.port=8080
# The backend is a normal HTTP application.
spring.main.web-application-type=servlet
# Authentik host can differ per environment, e.g.:
# local:  AUTHENTIK_HOST=http://localhost:9000
# prod:   AUTHENTIK_HOST=https://auth.example.com
app.authentik.host=${AUTHENTIK_HOST}
app.webhooks.authentik.secret=${AUTHENTIK_WEBHOOK_SECRET}
app.webhooks.authentik.allowed-source-cidrs=${AUTHENTIK_WEBHOOK_SECRET_ALLOWED_SOURCE_CIDRS}
app.webhooks.authentik.debug=true
# Replace `your-provider-slug` with the slug of your Authentik OAuth2/OpenID provider/application.
app.authentik.issuer-uri=${app.authentik.host}/application/o/lekker-atlas/
# The frontend performs the OIDC login. The backend only validates incoming Bearer JWTs.
spring.security.oauth2.resourceserver.jwt.issuer-uri=${app.authentik.issuer-uri}
server.forward-headers-strategy=framework
# OpenAPI config
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/
# Swagger UI can still authenticate as a public OIDC client using PKCE.
springdoc.swagger-ui.oauth.client-id=${AUTHENTIK_PUBLIC_CLIENT_ID:${AUTHENTIK_CLIENT_ID:}}
springdoc.swagger-ui.oauth.use-pkce-with-authorization-code-grant=true
springdoc.swagger-ui.oauth.scopes=openid profile email
# Optional UX improvements
springdoc.swagger-ui.oauth.app-name=LekkerAtlas API
springdoc.swagger-ui.persist-authorization=true
