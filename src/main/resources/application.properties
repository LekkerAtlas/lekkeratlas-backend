spring.application.name=lekkeratlas

# Default RabbitMQ settings.
# Docker Compose can override these using environment variables:
# SPRING_RABBITMQ_HOST, SPRING_RABBITMQ_USERNAME, SPRING_RABBITMQ_PASSWORD
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=admin


# Good default for mixed long/short jobs in one queue.
spring.rabbitmq.listener.simple.prefetch=1

