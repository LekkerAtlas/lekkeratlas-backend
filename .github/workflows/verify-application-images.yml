name: Verify application images

on:
  workflow_call:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run Gradle checks
        run: ./gradlew clean check

      - name: Build executable JARs
        run: ./gradlew bootJarBackend bootJarWorker

      - name: Test build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          build-args: |
            JAR_FILE=build/libs/lekkeratlas-backend.jar
            SPRING_PROFILES_ACTIVE=prod,backend
          tags: test/lekkeratlas-backend:ci

      - name: Test build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          build-args: |
            JAR_FILE=build/libs/lekkeratlas-worker.jar
            SPRING_PROFILES_ACTIVE=prod,worker
          tags: test/lekkeratlas-worker:ci

      - name: Upload backend JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: build/libs/lekkeratlas-backend.jar

      - name: Upload worker JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: worker-jar
          path: build/libs/lekkeratlas-worker.jar