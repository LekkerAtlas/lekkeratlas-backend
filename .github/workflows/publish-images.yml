name: Build and publish application images

on:
  pull_request:
  push:
    branches: [ "main" ]
  release:
    types: [ published ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}-backend
  WORKER_IMAGE_NAME: ${{ github.repository }}-worker

jobs:
  publish-mode:
    runs-on: ubuntu-latest

    outputs:
      publish_experimental: ${{ steps.publish-mode.outputs.publish_experimental }}
      publish_release: ${{ steps.publish-mode.outputs.publish_release }}

    steps:
      - name: Determine publish mode
        id: publish-mode
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "publish_experimental=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_experimental=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "${{ github.event_name }}" == "release" && "${{ github.event.release.tag_name }}" == v* ]]; then
            echo "publish_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_release=false" >> "$GITHUB_OUTPUT"
          fi

  verify:
    uses: ./.github/workflows/verify-application-images.yml
    permissions:
      contents: read

  publish:
    needs: [ publish-mode, verify ]
    if: needs.publish-mode.outputs.publish_experimental == 'true' || needs.publish-mode.outputs.publish_release == 'true'
    uses: ./.github/workflows/publish-application-images.yml
    permissions:
      contents: read
      packages: write
    with:
      registry: ghcr.io
      backend_image_name: ${{ github.repository }}-backend
      worker_image_name: ${{ github.repository }}-worker
      publish_experimental: ${{ needs.publish-mode.outputs.publish_experimental == 'true' }}
      publish_release: ${{ needs.publish-mode.outputs.publish_release == 'true' }}