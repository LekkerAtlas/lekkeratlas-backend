name: Build and publish application images

on:
  pull_request:
  push:
    branches: [ "main" ]
  release:
    types: [ published ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}-backend
  WORKER_IMAGE_NAME: ${{ github.repository }}-worker

jobs:
  test-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      publish_experimental: ${{ steps.publish-mode.outputs.publish_experimental }}
      publish_release: ${{ steps.publish-mode.outputs.publish_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine publish mode
        id: publish-mode
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "publish_experimental=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_experimental=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "${{ github.event_name }}" == "release" && "${{ github.event.release.tag_name }}" == v* ]]; then
            echo "publish_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run Gradle checks
        run: ./gradlew clean check

      - name: Build executable JARs
        run: ./gradlew bootJarBackend bootJarWorker

      - name: Test build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          build-args: |
            JAR_FILE=build/libs/lekkeratlas-backend.jar
            SPRING_PROFILES_ACTIVE=prod,backend
          tags: test/lekkeratlas-backend:ci

      - name: Test build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          build-args: |
            JAR_FILE=build/libs/lekkeratlas-worker.jar
            SPRING_PROFILES_ACTIVE=prod,worker
          tags: test/lekkeratlas-worker:ci

      - name: Upload backend JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: build/libs/lekkeratlas-backend.jar

      - name: Upload worker JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: worker-jar
          path: build/libs/lekkeratlas-worker.jar

  docker:
    runs-on: ubuntu-latest
    needs: test-build

    permissions:
      contents: read
      packages: write

    if: needs.test-build.outputs.publish_experimental == 'true' || needs.test-build.outputs.publish_release == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: build/libs

      - name: Download worker JAR
        uses: actions/download-artifact@v4
        with:
          name: worker-jar
          path: build/libs

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend Docker metadata
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=raw,value=experimental,enable=${{ needs.test-build.outputs.publish_experimental == 'true' }}
            type=raw,value=latest,enable=${{ needs.test-build.outputs.publish_release == 'true' }}
            type=semver,pattern={{version}},enable=${{ needs.test-build.outputs.publish_release == 'true' }}
            type=sha

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            JAR_FILE=build/libs/lekkeratlas-backend.jar
            SPRING_PROFILES_ACTIVE=prod,backend
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}

      - name: Extract worker Docker metadata
        id: worker-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}
          tags: |
            type=raw,value=experimental,enable=${{ needs.test-build.outputs.publish_experimental == 'true' }}
            type=raw,value=latest,enable=${{ needs.test-build.outputs.publish_release == 'true' }}
            type=semver,pattern={{version}},enable=${{ needs.test-build.outputs.publish_release == 'true' }}
            type=sha

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            JAR_FILE=build/libs/lekkeratlas-worker.jar
            SPRING_PROFILES_ACTIVE=prod,worker
          tags: ${{ steps.worker-meta.outputs.tags }}
          labels: ${{ steps.worker-meta.outputs.labels }}